# QuantShift Crypto Bot Configuration
# Uses Coinbase for crypto perpetuals trading

bot_name: "quantshift-crypto"
bot_type: "crypto"

# Executor configuration
executor:
  type: "coinbase"
  use_dynamic_symbols: true  # Fetch top 50 cryptos dynamically
  symbol_universe:
    max_symbols: 50  # Top 50 by market cap
    min_volume: 1000000  # Minimum $1M daily volume
  simulated_capital: 10000  # Paper trading with $10,000 simulated capital

# Strategy configuration - CRYPTO OPTIMIZED
strategies:
  - type: "BollingerBounce"
    params:
      bb_period: 20
      bb_std: 2.5  # Wider bands for crypto volatility
      rsi_period: 14
      rsi_entry_threshold: 50  # Higher threshold for crypto
      atr_period: 14
      atr_sl_multiplier: 2.0  # Wider stops for crypto volatility
      risk_per_trade: 0.02  # 2% risk for paper trading (faster learning)
  
  - type: "RSIMeanReversion"
    params:
      rsi_period: 14
      rsi_oversold: 25  # Lower for crypto (can go very oversold)
      rsi_overbought: 75  # Higher for crypto (can go very overbought)
      atr_period: 14
      atr_sl_multiplier: 2.5  # Wider stops for volatility
      atr_tp_multiplier: 4.0  # Wider targets for bigger moves
      risk_per_trade: 0.02  # 2% risk for paper trading
  
  - type: "BreakoutMomentum"
    params:
      breakout_period: 15  # Shorter period for faster crypto moves
      volume_multiplier: 2.0  # Higher volume confirmation for crypto
      atr_period: 14
      atr_trail_multiplier: 2.0  # Wider trailing stop
      breakdown_period: 10
      risk_per_trade: 0.02  # 2% risk for paper trading

# Strategy orchestrator configuration
orchestrator:
  capital_allocation:
    BollingerBounce: 0.25  # Less allocation to mean reversion in crypto
    RSIMeanReversion: 0.25
    BreakoutMomentum: 0.50  # More allocation to momentum (crypto trends hard)
  use_regime_detection: true
  use_ml_regime: true  # Use ML-based regime classifier (91.7% accuracy)
  use_risk_management: true
  use_sentiment_analysis: true  # Use FinBERT sentiment analysis for signal filtering
  
  # Regime-based allocation (AI/ML adaptive)
  regime_allocation:
    bull_trending:
      BreakoutMomentum: 0.60
      BollingerBounce: 0.20
      RSIMeanReversion: 0.20
    bear_trending:
      BreakoutMomentum: 0.50
      BollingerBounce: 0.25
      RSIMeanReversion: 0.25
    high_volatility:
      BreakoutMomentum: 0.40
      BollingerBounce: 0.30
      RSIMeanReversion: 0.30
    low_volatility:
      BreakoutMomentum: 0.30
      BollingerBounce: 0.35
      RSIMeanReversion: 0.35

# Risk management configuration
risk_management:
  max_portfolio_heat: 0.15  # 15% max total risk (higher for crypto paper trading)
  max_position_correlation: 0.8  # Crypto correlates more
  max_sector_exposure: 0.50  # Less relevant for crypto
  daily_loss_limit: 0.08  # 8% daily loss limit (crypto is more volatile)
  max_drawdown_limit: 0.20  # 20% max drawdown (crypto drawdowns are larger)
  
  # Kelly Criterion position sizing
  use_kelly_sizing: true  # Enable Kelly Criterion (requires 20+ trades)
  kelly_fraction: 0.25  # Use 25% Kelly for safety
  kelly_min_trades: 20  # Minimum trades required for Kelly calculation

# Phase 4: Adaptive Optimization & ML Learning
adaptive_optimization:
  # Parameter optimization
  enable_parameter_optimization: true  # Enable automated parameter re-optimization
  optimization_interval_days: 7  # Days between optimizations (weekly)
  min_trades_for_optimization: 30  # Minimum trades needed to run optimization
  
  # Strategy auto-disable
  enable_auto_disable: true  # Enable automated strategy disable based on performance
  min_win_rate: 0.35  # Lower threshold for crypto (more volatile)
  min_sharpe: 0.3  # Lower Sharpe threshold for crypto
  performance_lookback_days: 14  # Days to evaluate performance
  reenable_check_days: 3  # Days between re-enable checks
  
  # Regime prediction tracking
  enable_regime_tracking: true  # Track ML vs rule-based regime accuracy
  regime_accuracy_window_days: 30  # Days to calculate accuracy over
  regime_comparison_interval_hours: 24  # Hours between comparisons

# Redis configuration
redis:
  host: "localhost"
  port: 6379
  db: 0

# Bot timing
cycle_interval_seconds: 60  # Run strategy every 1 minute (crypto moves fast)
heartbeat_interval_seconds: 30  # Send heartbeat every 30 seconds

# Prometheus metrics
metrics_port: 9201  # HTTP port for Prometheus metrics endpoint
