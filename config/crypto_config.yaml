# QuantShift Crypto Bot Configuration
# Uses Coinbase for crypto perpetuals trading

bot_name: "quantshift-crypto"
bot_type: "crypto"

# Executor configuration
executor:
  type: "coinbase"
  use_dynamic_symbols: true  # Fetch top 50 cryptos dynamically
  symbol_universe:
    max_symbols: 50  # Top 50 by market cap
    min_volume: 1000000  # Minimum $1M daily volume
  simulated_capital: 10000  # Paper trading with $10,000 simulated capital

# Strategy configuration - CRYPTO OPTIMIZED (7 STRATEGIES)
strategies:
  # Mean Reversion Strategies (4)
  - type: "BollingerBounce"
    params:
      bb_period: 20
      bb_std: 2.5  # Wider bands for crypto volatility
      rsi_period: 14
      rsi_entry_threshold: 50
      atr_period: 14
      atr_sl_multiplier: 2.0
      risk_per_trade: 0.01  # 1% risk per trade (reduced from 2%)
  
  - type: "RSIMeanReversion"
    params:
      rsi_period: 14
      rsi_oversold: 25  # Lower for crypto
      rsi_overbought: 75  # Higher for crypto
      atr_period: 14
      atr_sl_multiplier: 2.5
      atr_tp_multiplier: 4.0
      risk_per_trade: 0.01  # 1% risk per trade (reduced from 2%)
  
  - type: "KeltnerChannelStrategy"
    params:
      ema_period: 20
      atr_period: 14
      atr_multiplier: 2.5  # Wider for crypto
      rsi_period: 14
      rsi_buy_threshold: 40
      rsi_sell_threshold: 60
      risk_per_trade: 0.01  # 1% risk per trade
      volume_confirmation: true
  
  - type: "VWAPReversionStrategy"
    params:
      vwap_std_multiplier: 2.5  # Wider for crypto
      volume_spike_threshold: 1.5
      atr_period: 14
      atr_sl_multiplier: 2.5
      atr_tp_multiplier: 4.0
      risk_per_trade: 0.01  # 1% risk per trade
  
  # Trend Following Strategies (3)
  - type: "BreakoutMomentum"
    params:
      breakout_period: 15  # Shorter for crypto
      volume_multiplier: 2.0
      atr_period: 14
      atr_trail_multiplier: 2.0
      breakdown_period: 10
      risk_per_trade: 0.01  # 1% risk per trade
  
  - type: "MACrossoverStrategy"
    params:
      short_window: 10  # Faster for crypto
      long_window: 30
      atr_period: 14
      risk_per_trade: 0.01  # 1% risk per trade
      volume_confirmation: true
      trend_confirmation: false  # Too slow for crypto
      support_resistance_filter: true
  
  - type: "DonchianBreakoutStrategy"
    params:
      entry_period: 20
      exit_period: 10
      atr_period: 14
      atr_sl_multiplier: 2.5
      atr_trail_multiplier: 3.0
      risk_per_trade: 0.01  # 1% risk per trade
      volume_confirmation: true
      min_atr_filter: 0.0

# Strategy orchestrator configuration - 7 STRATEGIES
orchestrator:
  # Base allocation (equal weight to start, AI will optimize)
  capital_allocation:
    BollingerBounce: 0.14
    RSIMeanReversion: 0.14
    KeltnerChannelStrategy: 0.14
    VWAPReversionStrategy: 0.14
    BreakoutMomentum: 0.15
    MACrossoverStrategy: 0.15
    DonchianBreakoutStrategy: 0.14
  
  use_regime_detection: true
  use_ml_regime: true  # Use ML-based regime classifier (91.7% accuracy)
  use_risk_management: true
  use_sentiment_analysis: true  # Use FinBERT sentiment analysis
  
  # Regime-based allocation (AI/ML adaptive - will shift capital dynamically)
  regime_allocation:
    bull_trending:
      # Favor trend-following in bull markets
      BreakoutMomentum: 0.25
      MACrossoverStrategy: 0.20
      DonchianBreakoutStrategy: 0.20
      BollingerBounce: 0.12
      RSIMeanReversion: 0.10
      KeltnerChannelStrategy: 0.08
      VWAPReversionStrategy: 0.05
    
    bear_trending:
      # Favor mean reversion in bear markets (buy dips)
      RSIMeanReversion: 0.20
      BollingerBounce: 0.18
      VWAPReversionStrategy: 0.17
      KeltnerChannelStrategy: 0.15
      BreakoutMomentum: 0.15
      DonchianBreakoutStrategy: 0.10
      MACrossoverStrategy: 0.05
    
    high_volatility:
      # Balanced approach in volatile markets
      VWAPReversionStrategy: 0.20
      KeltnerChannelStrategy: 0.18
      BreakoutMomentum: 0.17
      DonchianBreakoutStrategy: 0.15
      BollingerBounce: 0.12
      RSIMeanReversion: 0.10
      MACrossoverStrategy: 0.08
    
    low_volatility:
      # Favor mean reversion in ranging markets
      BollingerBounce: 0.22
      RSIMeanReversion: 0.20
      KeltnerChannelStrategy: 0.18
      VWAPReversionStrategy: 0.15
      MACrossoverStrategy: 0.12
      BreakoutMomentum: 0.08
      DonchianBreakoutStrategy: 0.05

# Risk management configuration
risk_management:
  # SAFE PAPER TRADING LIMITS (No Leverage)
  max_leverage: 1.0  # NO LEVERAGE - cash only
  max_position_size: 0.10  # Max 10% per position (crypto is more volatile)
  max_positions: 8  # Max 8 concurrent positions
  max_capital_deployed: 0.80  # Max 80% of capital deployed (crypto is 24/7)
  
  # Portfolio risk limits
  max_portfolio_heat: 0.15  # 15% max total risk (higher for crypto paper trading)
  max_position_correlation: 0.8  # Crypto correlates more
  max_sector_exposure: 0.50  # Less relevant for crypto
  daily_loss_limit: 0.08  # 8% daily loss limit (crypto is more volatile)
  max_drawdown_limit: 0.20  # 20% max drawdown (crypto drawdowns are larger)
  
  # Position sizing
  use_kelly_sizing: false  # Disable Kelly until we have 50+ trades
  kelly_fraction: 0.25  # Use 25% Kelly for safety (when enabled)
  kelly_min_trades: 50  # Minimum trades required for Kelly calculation
  default_position_size: 0.03  # 3% per trade (crypto is volatile)

# Phase 4: Adaptive Optimization & ML Learning
adaptive_optimization:
  # Parameter optimization
  enable_parameter_optimization: true  # Enable automated parameter re-optimization
  optimization_interval_days: 7  # Days between optimizations (weekly)
  min_trades_for_optimization: 30  # Minimum trades needed to run optimization
  
  # Strategy auto-disable
  enable_auto_disable: true  # Enable automated strategy disable based on performance
  min_win_rate: 0.35  # Lower threshold for crypto (more volatile)
  min_sharpe: 0.3  # Lower Sharpe threshold for crypto
  performance_lookback_days: 14  # Days to evaluate performance
  reenable_check_days: 3  # Days between re-enable checks
  
  # Regime prediction tracking
  enable_regime_tracking: true  # Track ML vs rule-based regime accuracy
  regime_accuracy_window_days: 30  # Days to calculate accuracy over
  regime_comparison_interval_hours: 24  # Hours between comparisons

  # Trailing stop-loss configuration
  trailing_stops:
    enabled: true  # Enable trailing stops
    activation_threshold_pct: 0.015  # Activate after +1.5% gain (crypto is more volatile)
    trail_distance_atr_mult: 2.0  # Trail 2.0×ATR below high water mark (wider for crypto)
    min_trail_distance_pct: 0.008  # Minimum 0.8% trail distance (wider for crypto)
    update_frequency_seconds: 30  # Check positions every 30 seconds
    only_improve_stop: true  # Never move stop against us (only higher for longs)

# Redis configuration
redis:
  host: "localhost"
  port: 6379
  db: 0

# Bot timing
cycle_interval_seconds: 60  # Run strategy every 1 minute (crypto moves fast)
heartbeat_interval_seconds: 30  # Send heartbeat every 30 seconds

# Prometheus metrics
metrics_port: 9201  # HTTP port for Prometheus metrics endpoint
