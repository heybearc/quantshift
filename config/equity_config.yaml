# QuantShift Equity Bot Configuration
# Uses Alpaca for US stock trading

bot_name: "quantshift-equity"
bot_type: "equity"

# Executor configuration
executor:
  type: "alpaca"
  paper: true  # Use paper trading account
  use_dynamic_symbols: true  # Fetch top 100 symbols dynamically
  symbol_universe:
    max_symbols: 100  # Top 100 by market cap/volume
    min_volume: 1000000  # Minimum $1M daily volume
  simulated_capital: null  # Use actual account balance

# Strategy configuration - EQUITY OPTIMIZED (7 STRATEGIES)
strategies:
  # Mean Reversion Strategies (4)
  - type: "BollingerBounce"
    params:
      bb_period: 20
      bb_std: 2.0
      rsi_period: 14
      rsi_entry_threshold: 45
      atr_period: 14
      atr_sl_multiplier: 1.5
      risk_per_trade: 0.015
  
  - type: "RSIMeanReversion"
    params:
      rsi_period: 14
      rsi_oversold: 35
      rsi_overbought: 65
      atr_period: 14
      atr_sl_multiplier: 2.0
      atr_tp_multiplier: 3.0
      risk_per_trade: 0.015
  
  - type: "KeltnerChannelStrategy"
    params:
      ema_period: 20
      atr_period: 14
      atr_multiplier: 2.0
      rsi_period: 14
      rsi_buy_threshold: 45
      rsi_sell_threshold: 55
      risk_per_trade: 0.015
      volume_confirmation: true
  
  - type: "VWAPReversionStrategy"
    params:
      vwap_std_multiplier: 2.0
      volume_spike_threshold: 1.5
      atr_period: 14
      atr_sl_multiplier: 2.0
      atr_tp_multiplier: 3.0
      risk_per_trade: 0.015
  
  # Trend Following Strategies (3)
  - type: "BreakoutMomentum"
    params:
      breakout_period: 20
      volume_multiplier: 1.5
      atr_period: 14
      atr_trail_multiplier: 1.5
      breakdown_period: 10
      risk_per_trade: 0.015
  
  - type: "MACrossoverStrategy"
    params:
      short_window: 20
      long_window: 50
      atr_period: 14
      risk_per_trade: 0.015
      volume_confirmation: true
      trend_confirmation: true
      support_resistance_filter: true
  
  - type: "DonchianBreakoutStrategy"
    params:
      entry_period: 20
      exit_period: 10
      atr_period: 14
      atr_sl_multiplier: 2.0
      atr_trail_multiplier: 3.0
      risk_per_trade: 0.015
      volume_confirmation: true
      min_atr_filter: 0.0

# Strategy orchestrator configuration - 7 STRATEGIES
orchestrator:
  # Base allocation (equal weight to start, AI will optimize)
  capital_allocation:
    BollingerBounce: 0.14
    RSIMeanReversion: 0.14
    KeltnerChannelStrategy: 0.14
    VWAPReversionStrategy: 0.14
    BreakoutMomentum: 0.15
    MACrossoverStrategy: 0.15
    DonchianBreakoutStrategy: 0.14
  
  use_regime_detection: true
  use_ml_regime: true  # Use ML-based regime classifier (91.7% accuracy)
  use_risk_management: true
  use_sentiment_analysis: true  # Use FinBERT sentiment analysis
  
  # Regime-based allocation (AI/ML adaptive)
  regime_allocation:
    bull_trending:
      # Favor trend-following in bull markets
      MACrossoverStrategy: 0.25
      DonchianBreakoutStrategy: 0.22
      BreakoutMomentum: 0.20
      BollingerBounce: 0.12
      RSIMeanReversion: 0.10
      KeltnerChannelStrategy: 0.08
      VWAPReversionStrategy: 0.03
    
    bear_trending:
      # Favor mean reversion in bear markets
      RSIMeanReversion: 0.22
      BollingerBounce: 0.20
      KeltnerChannelStrategy: 0.18
      VWAPReversionStrategy: 0.15
      BreakoutMomentum: 0.12
      DonchianBreakoutStrategy: 0.08
      MACrossoverStrategy: 0.05
    
    high_volatility:
      # Balanced with volatility-based strategies
      VWAPReversionStrategy: 0.22
      KeltnerChannelStrategy: 0.20
      BollingerBounce: 0.18
      BreakoutMomentum: 0.15
      DonchianBreakoutStrategy: 0.12
      RSIMeanReversion: 0.08
      MACrossoverStrategy: 0.05
    
    low_volatility:
      # Favor mean reversion in ranging markets
      BollingerBounce: 0.25
      RSIMeanReversion: 0.22
      KeltnerChannelStrategy: 0.20
      VWAPReversionStrategy: 0.15
      MACrossoverStrategy: 0.10
      BreakoutMomentum: 0.05
      DonchianBreakoutStrategy: 0.03

# Risk management configuration
risk_management:
  # SAFE PAPER TRADING LIMITS (No Leverage)
  max_leverage: 1.0  # NO LEVERAGE - cash only
  max_position_size: 0.05  # Max 5% per position
  max_positions: 10  # Max 10 concurrent positions
  max_capital_deployed: 0.50  # Max 50% of capital deployed at once
  
  # Portfolio risk limits
  max_portfolio_heat: 0.10  # 10% max total risk
  max_position_correlation: 0.7
  max_sector_exposure: 0.30
  daily_loss_limit: 0.05  # 5% daily loss limit
  max_drawdown_limit: 0.15  # 15% max drawdown
  
  # Position sizing
  use_kelly_sizing: false  # Disable Kelly until we have 50+ trades
  kelly_fraction: 0.25  # Use 25% Kelly for safety (when enabled)
  kelly_min_trades: 50  # Minimum trades required for Kelly calculation
  default_position_size: 0.02  # 2% per trade (conservative)
  
  # Trailing stop-loss configuration
  trailing_stops:
    enabled: true  # Enable trailing stops
    activation_threshold_pct: 0.01  # Activate after +1% gain from entry
    trail_distance_atr_mult: 1.5  # Trail 1.5×ATR below high water mark
    min_trail_distance_pct: 0.005  # Minimum 0.5% trail distance
    update_frequency_seconds: 30  # Check positions every 30 seconds
    only_improve_stop: true  # Never move stop against us (only higher for longs)

# Phase 4: Adaptive Optimization & ML Learning
adaptive_optimization:
  # Parameter optimization
  enable_parameter_optimization: true  # Enable automated parameter re-optimization
  optimization_interval_days: 7  # Days between optimizations (weekly for faster learning)
  min_trades_for_optimization: 30  # Minimum trades needed to run optimization
  
  # Strategy auto-disable
  enable_auto_disable: true  # Enable automated strategy disable based on performance
  min_win_rate: 0.40  # Minimum acceptable win rate (40%)
  min_sharpe: 0.5  # Minimum acceptable Sharpe ratio
  performance_lookback_days: 14  # Days to evaluate performance (shorter for faster feedback)
  reenable_check_days: 3  # Days between re-enable checks (faster iteration)
  
  # Regime prediction tracking
  enable_regime_tracking: true  # Track ML vs rule-based regime accuracy
  regime_accuracy_window_days: 30  # Days to calculate accuracy over
  regime_comparison_interval_hours: 24  # Hours between comparisons

# Redis configuration
redis:
  host: "localhost"
  port: 6379
  db: 0

# Bot timing
cycle_interval_seconds: 60  # Run strategy every 60 seconds
heartbeat_interval_seconds: 30  # Send heartbeat every 30 seconds

# Prometheus metrics
metrics_port: 9200  # HTTP port for Prometheus metrics endpoint
