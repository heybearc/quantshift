# QuantShift Equity Bot Configuration
# Uses Alpaca for US stock trading

bot_name: "quantshift-equity"
bot_type: "equity"

# Executor configuration
executor:
  type: "alpaca"
  paper: true  # Use paper trading account
  use_dynamic_symbols: true  # Fetch top 100 symbols dynamically
  symbol_universe:
    max_symbols: 100  # Top 100 by market cap/volume
    min_volume: 1000000  # Minimum $1M daily volume
  simulated_capital: null  # Use actual account balance

# Strategy configuration
strategies:
  - type: "BollingerBounce"
    params:
      bb_period: 20
      bb_std: 2.0
      rsi_period: 14
      rsi_entry_threshold: 45  # Relaxed from 40 for more signals
      atr_period: 14
      atr_sl_multiplier: 1.5
      risk_per_trade: 0.01
  
  - type: "RSIMeanReversion"
    params:
      rsi_period: 14
      rsi_oversold: 35  # Relaxed from 30 for more signals
      rsi_overbought: 65  # Tightened from 70 for earlier exits
      atr_period: 14
      atr_sl_multiplier: 2.0
      atr_tp_multiplier: 3.0
      risk_per_trade: 0.01
  
  - type: "BreakoutMomentum"
    params:
      breakout_period: 20
      volume_multiplier: 1.5
      atr_period: 14
      atr_trail_multiplier: 1.5
      breakdown_period: 10
      risk_per_trade: 0.01

# Strategy orchestrator configuration
orchestrator:
  capital_allocation:
    BollingerBounce: 0.33
    RSIMeanReversion: 0.33
    BreakoutMomentum: 0.34
  use_regime_detection: true
  use_ml_regime: true  # Use ML-based regime classifier (91.7% accuracy)
  use_risk_management: true
  use_sentiment_analysis: true  # Use FinBERT sentiment analysis for signal filtering

# Risk management configuration
risk_management:
  max_portfolio_heat: 0.10  # 10% max total risk
  max_position_correlation: 0.7
  max_sector_exposure: 0.30
  daily_loss_limit: 0.05  # 5% daily loss limit
  max_drawdown_limit: 0.15  # 15% max drawdown
  
  # Kelly Criterion position sizing
  use_kelly_sizing: false  # Enable Kelly Criterion (requires 20+ trades)
  kelly_fraction: 0.25  # Use 25% Kelly for safety
  kelly_min_trades: 20  # Minimum trades required for Kelly calculation

# Phase 4: Adaptive Optimization & ML Learning
adaptive_optimization:
  # Parameter optimization
  enable_parameter_optimization: false  # Enable automated parameter re-optimization
  optimization_interval_days: 30  # Days between optimizations
  min_trades_for_optimization: 50  # Minimum trades needed to run optimization
  
  # Strategy auto-disable
  enable_auto_disable: false  # Enable automated strategy disable based on performance
  min_win_rate: 0.40  # Minimum acceptable win rate (40%)
  min_sharpe: 0.5  # Minimum acceptable Sharpe ratio
  performance_lookback_days: 30  # Days to evaluate performance
  reenable_check_days: 7  # Days between re-enable checks
  
  # Regime prediction tracking
  enable_regime_tracking: true  # Track ML vs rule-based regime accuracy
  regime_accuracy_window_days: 30  # Days to calculate accuracy over
  regime_comparison_interval_hours: 24  # Hours between comparisons

# Redis configuration
redis:
  host: "localhost"
  port: 6379
  db: 0

# Bot timing
cycle_interval_seconds: 60  # Run strategy every 60 seconds
heartbeat_interval_seconds: 30  # Send heartbeat every 30 seconds

# Prometheus metrics
metrics_port: 9200  # HTTP port for Prometheus metrics endpoint
